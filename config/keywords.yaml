# =====================================================================
# X Search Keyword Sets
# =====================================================================
# 各テーマごとにキーワードをグルーピング。CLI の --topic で個別実行可能、
# --topic all で全部走査。
#
# Topic 命名規約: 製品名固有を避け、概念ベースで陳腐化耐性を持たせる。
#   (例: grok_xai → frontier_models, hermes_openclaw → multi_agent_systems)
# =====================================================================

themes:
  claude_code:
    description: "Claude Code / Claude API / Skills / Agent SDK"
    keywords:
      - "Claude Code"
      - "Claude API"
      - "Anthropic"
      - "Claude Skills"
      - "Claude Agent SDK"

  ai_agents:
    description: "AI Agent ・ Coding Agent 全般"
    keywords:
      - "AI agent"
      - "coding agent"
      - "autonomous agent"
      - "agentic AI"
      - "agent framework"

  frontier_models:
    description: "Frontier LLM (Claude / GPT / Gemini / Grok) — 性能・リリース・比較"
    keywords:
      - "GPT-5"
      - "Gemini 2.5"
      - "Claude Opus"
      - "Grok 4"
      - "frontier model"
      - "SOTA LLM"

  multi_agent_systems:
    description: "Multi-Agent / Agent Orchestration (Hermes / CrewAI / LangGraph 等)"
    keywords:
      - "multi-agent"
      - "agent orchestration"
      - "Hermes Agent"
      - "CrewAI"
      - "LangGraph"
      - "multi-provider agent"

  ai_infrastructure:
    description: "GPU / Inference / NVIDIA / AWS Bedrock / Azure AI Foundry"
    keywords:
      - "NVIDIA NIM"
      - "Blackwell"
      - "AWS Bedrock"
      - "Azure AI Foundry"
      - "inference cost"
      - "GPU cloud"

  data_platforms:
    description: "Lakehouse / Snowflake / Databricks / BigQuery — AI ネイティブ機能"
    keywords:
      - "Snowflake Cortex"
      - "Databricks"
      - "Unity Catalog"
      - "BigQuery AI"
      - "lakehouse AI"

  ai_governance:
    description: "AI governance / AI Act / model risk / responsible AI"
    keywords:
      - "AI governance"
      - "AI Act"
      - "AI compliance"
      - "model risk"
      - "responsible AI"

  enterprise_ai_adoption:
    description: "Enterprise AI Adoption — 大企業の AI 実運用・ROI・失敗事例・transformation"
    keywords:
      - "enterprise AI adoption"
      - "AI ROI"
      - "production AI"
      - "AI transformation"
      - "enterprise deployment"
      - "AI implementation failure"
      - "business AI adoption"
