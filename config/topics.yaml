# =====================================================================
# Radar-like Trend Monitoring Topics
# =====================================================================
# 各トピックは「監視対象キーワード群 + 想定論点」を持つ。
# trend_analyzer がトピック単位で集計・要約する。
#
# Topic id は config/keywords.yaml::themes のキーと 1:1 で対応させる。
# (trend_analyzer が item.topic = theme_id で集計するため)
# =====================================================================

topics:
  - id: claude_code
    label: "Claude Code / Anthropic"
    keywords: ["Claude Code", "Claude API", "Anthropic", "Skills", "Agent SDK"]
    angles:
      - "エージェント運用のベストプラクティス"
      - "コスト最適化 / context management"
      - "Skills / MCP / Hooks / Agent SDK"

  - id: ai_agents
    label: "AI Agents"
    keywords: ["AI agent", "coding agent", "agentic AI"]
    angles:
      - "誰が AI agent の標準を握るか"
      - "エンタープライズ採用の障壁"
      - "コーディング系 vs ビジネス系"

  - id: frontier_models
    label: "Frontier Models"
    keywords: ["GPT-5", "Gemini", "Claude Opus", "Grok 4", "frontier model"]
    angles:
      - "性能比較と用途別最適解"
      - "Tool-use 信頼性 / Long-context"
      - "Pricing / quota / availability"

  - id: multi_agent_systems
    label: "Multi-Agent Systems"
    keywords: ["multi-agent", "agent orchestration", "Hermes", "CrewAI", "LangGraph"]
    angles:
      - "Orchestrator pattern の進化"
      - "Multi-provider OAuth"
      - "MCP / 共通 tool registry"

  - id: ai_infrastructure
    label: "AI Infrastructure"
    keywords: ["NVIDIA", "NIM", "Blackwell", "Bedrock", "inference"]
    angles:
      - "Inference コスト"
      - "On-prem vs cloud"
      - "Sovereign AI"

  - id: data_platforms
    label: "Data Platforms"
    keywords: ["Snowflake", "Databricks", "BigQuery", "lakehouse", "Unity Catalog"]
    angles:
      - "AI ネイティブ機能"
      - "ガバナンスと統合"
      - "Agent から見たデータ層"

  - id: ai_governance
    label: "AI Governance"
    keywords: ["AI governance", "AI Act", "compliance", "responsible AI", "model risk"]
    angles:
      - "AI Act 実務影響"
      - "Agent identity / authz"
      - "Policy-as-code"

  - id: enterprise_ai_adoption
    label: "Enterprise AI Adoption"
    keywords: ["enterprise AI", "AI ROI", "production AI", "AI transformation", "Copilot adoption"]
    angles:
      - "Fortune 500 / 大企業の AI 実運用実態"
      - "AI ROI / 失敗事例 / Trough of Disillusionment"
      - "Enterprise deployment patterns と governance"
