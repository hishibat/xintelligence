# =====================================================================
# Output Format Configuration
# =====================================================================

output:
  base_dir: "outputs"
  daily_reports_dir: "daily_reports"
  csv_dir: "csv"
  excel_dir: "excel"
  content_drafts_dir: "content_drafts"
  video_prompts_dir: "video_prompts"
  review_queue_dir: "review_queue"

  formats:
    markdown: true
    csv: true
    excel: true       # MVP に含む。openpyxl 使用

  excel:
    sheets:
      - "Top10"
      - "AllItems"
      - "TrendSummary"
      - "ContentIdeas"
      - "VideoPrompts"

# --- Scoring ---------------------------------------------------------
scoring:
  weights:
    importance: 0.30
    novelty: 0.20
    career_relevance: 0.20
    note_fit: 0.15
    x_fit: 0.15
  top_n: 10

# --- LLM Token Budgets (per use) -------------------------------------
# Each generator looks up its slot here and passes it to llm.complete(...).
# Increase if you see content cut off near max length.
llm:
  max_tokens:
    why_important: 200      # per-Top-item short comment
    trend_summary: 800
    trend_angles: 400       # the bullet-list "切り口" follow-up
    x_post: 500
    x_thread: 1000
    note_outline: 1600
    # LinkedIn: 1 word ≈ 1.3 tokens (English). Standard length tops at 900
    # words → ~1170 tokens. Reserve +35% headroom for closing sentences and
    # safety margin so drafts never truncate mid-sentence.
    linkedin: 1600
    video_concept: 200
    video_scene: 400

# --- Content Drafts --------------------------------------------------
content:
  tones: ["professional", "insightful", "consulting_style", "casual", "bold_opinion"]
  default_tone: "insightful"
  channels: ["x_post", "x_thread", "note_outline", "linkedin"]
  drafts_per_channel: 1
  originality:
    require_my_angle: true
    require_source_summary: true
    require_originality_note: true
    needs_review_default: true
    forbid_verbatim_copy: true
  # LinkedIn-only length control. Switch length_mode to short/standard/long.
  linkedin:
    length_mode: "standard"        # short | standard | long
    length_bounds:
      short:    {min_words: 300,  max_words: 500,  guidance: "tight thought-piece"}
      standard: {min_words: 600,  max_words: 900,  guidance: "business essay"}
      long:     {min_words: 1200, max_words: 1500, guidance: "in-depth analysis"}

# --- Video Prompts ---------------------------------------------------
video:
  use_cases: ["note_header", "x_short", "linkedin_visual", "youtube_shorts"]
  prompts_per_use_case: 1
  bilingual: true   # EN prompt + JP explanation

# --- HITL Review -----------------------------------------------------
review:
  default_status: "needs_review"
  buckets:
    - "approved"
    - "rejected"
    - "needs_fact_check"
